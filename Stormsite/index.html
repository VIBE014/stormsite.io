<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="wSHB1gakhOmTggh0w85btYF68UIxIwry-klYP0sGN3s" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stormsite | Ocean & Sky Weather</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated background layers -->
    <div class="ocean-bg"></div>
    <div class="cloud-layer" id="cloudLayer"></div>
    <div class="wave-overlay"></div>

    <div class="container">
        <header class="storm-header">
            <h1>⛈️ STORMSITE</h1>
            <div class="header-utils">
                <span id="liveClock">--:--</span>
                <button id="unitToggle" class="unit-pill">°C</button>
            </div>
        </header>

        <div class="search-panel">
            <div class="search-flex">
                <div class="input-group">
                    <span class="search-icon">🌊</span>
                    <input type="text" id="cityInput" placeholder="e.g., Lisbon, Bali, Tokyo" value="London">
                </div>
                <button id="searchBtn" class="btn-primary">Forecast</button>
                <button id="locationBtn" class="btn-secondary">📍 My Ocean</button>
            </div>
            <div class="recent-strip" id="recentContainer"></div>
        </div>

        <div id="loadingSpinner" class="loading hidden">
            <div class="wave-spinner"></div>
            <p>reading the tides...</p>
        </div>

        <div id="weatherDashboard" class="dashboard hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
